<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <g id="title-block">
    <text x="60" y="84" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">Transform 同时保存空间状态与父子层级</text>
    <text x="62" y="122" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">世界 / 局部、方向向量、父子关系和坐标转换属于同一套空间语义</text>
  </g>
  <g id="axis-illustration" transform="translate(66 160)">
    <rect x="0" y="0" width="430" height="420" rx="28" fill="#FFF9E9" stroke="#D8D2C5" stroke-width="3"/>
    <use data-icon="tabler-outline/transform" x="32" y="28" width="58" height="58" fill="#2457A6" stroke-width="2"/>
    <text x="108" y="68" font-family="KaiTi, 'Trebuchet MS', serif" font-size="36" font-weight="700" fill="#2457A6">空间三要素</text>
    <g id="axis-lines" stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M215 288 L352 288" stroke="#D85C45"/>
      <path d="M215 288 L215 142" stroke="#55A68B"/>
      <path d="M215 288 L120 356" stroke="#2457A6"/>
      <path d="M338 276 L354 288 L338 300" stroke="#D85C45"/>
      <path d="M203 158 L215 140 L227 158" stroke="#55A68B"/>
      <path d="M133 338 L118 358 L143 355" stroke="#2457A6"/>
    </g>
    <circle cx="215" cy="288" r="42" fill="#F2A93B" stroke="#1A1A1A" stroke-width="3"/>
    <text x="215" y="297" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700" fill="#FFFFFF">Self</text>
    <text x="366" y="296" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700" fill="#D85C45">right</text>
    <text x="228" y="142" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700" fill="#2F8F6A">up</text>
    <text x="54" y="384" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700" fill="#2457A6">forward</text>
    <text x="215" y="402" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#596273">Space.Self 随物体朝向变化</text>
  </g>
  <g id="card-coordinates" transform="translate(532 160)">
    <rect x="0" y="0" width="688" height="122" rx="22" fill="#EAF0FA" stroke="#2457A6" stroke-width="3"/>
    <text x="24" y="42" font-family="KaiTi, 'Trebuchet MS', serif" font-size="34" font-weight="700" fill="#2457A6">1. 世界坐标 vs 局部坐标</text>
    <text x="24" y="80" font-family="Consolas, 'Courier New', monospace" font-size="23" fill="#1F2937">position / rotation</text>
    <text x="355" y="80" font-family="Consolas, 'Courier New', monospace" font-size="23" fill="#1F2937">localPosition / localRotation / localScale</text>
    <text x="24" y="108" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#596273">存在旋转或缩放的父物体时，两套数值会明显不同</text>
  </g>
  <g id="card-direction" transform="translate(532 302)">
    <rect x="0" y="0" width="688" height="122" rx="22" fill="#FFF0D1" stroke="#F2A93B" stroke-width="3"/>
    <text x="24" y="42" font-family="KaiTi, 'Trebuchet MS', serif" font-size="34" font-weight="700" fill="#8C5A00">2. 移动与朝向</text>
    <text x="24" y="80" font-family="Consolas, 'Courier New', monospace" font-size="23" fill="#1F2937">Translate(..., Space.Self) · Rotate · LookRotation</text>
    <text x="24" y="108" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#596273">水平朝向目标时，先把 direction.y 设为 0；复杂旋转优先 Quaternion</text>
  </g>
  <g id="card-hierarchy" transform="translate(532 444)">
    <rect x="0" y="0" width="688" height="136" rx="22" fill="#E8F5F0" stroke="#55A68B" stroke-width="3"/>
    <text x="24" y="42" font-family="KaiTi, 'Trebuchet MS', serif" font-size="34" font-weight="700" fill="#2F8F6A">3. 父子关系与坐标转换</text>
    <text x="24" y="79" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#1F2937">SetParent(newParent, true)  保持世界变换</text>
    <text x="24" y="109" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#1F2937">TransformPoint ↔ InverseTransformPoint</text>
    <text x="412" y="109" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#1F2937">Direction ↔ Direction</text>
    <text x="24" y="132" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#596273">点含位置信息；方向不含位置，转换函数不要混用</text>
  </g>
  <line id="footer-line" x1="58" y1="667" x2="1222" y2="667" stroke="#D8D2C5" stroke-width="2"/>
  <text x="60" y="700" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">Unity 语法基础 · Transform</text>
  <text id="page-number" data-pptx-role="page-number" x="1220" y="700" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#8A8F98">7</text>
</svg>
