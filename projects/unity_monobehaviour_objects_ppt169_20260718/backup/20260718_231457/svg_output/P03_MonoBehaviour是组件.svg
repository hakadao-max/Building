<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <g id="title-block">
    <text x="60" y="84" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">MonoBehaviour 让代码进入场景</text>
    <text x="62" y="122" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">GameObject 是容器；脚本挂载后，才会成为真正参与运行的组件</text>
  </g>
  <g id="object-container" transform="translate(62 154)">
    <rect x="0" y="0" width="690" height="448" rx="26" fill="#F4F0E8" stroke="#2457A6" stroke-width="3" stroke-dasharray="10 7"/>
    <g id="object-header">
      <use data-icon="tabler-outline/cube" x="28" y="22" width="46" height="46" fill="#2457A6" stroke-width="2"/>
      <text x="90" y="57" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="36" font-weight="700" fill="#2457A6">GameObject：RotatingCube</text>
    </g>
    <g id="component-transform" transform="translate(28 92)">
      <rect x="0" y="0" width="634" height="82" rx="18" fill="#FFFFFF" stroke="#D8D2C5" stroke-width="3"/>
      <use data-icon="tabler-outline/transform" x="24" y="20" width="42" height="42" fill="#2457A6" stroke-width="2"/>
      <text x="86" y="37" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="30" font-weight="700" fill="#1F2937">Transform</text>
      <text x="86" y="66" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#596273">每个对象必备：位置、旋转、缩放、父子层级</text>
    </g>
    <g id="component-renderer" transform="translate(28 188)">
      <rect x="0" y="0" width="634" height="82" rx="18" fill="#FFFFFF" stroke="#D8D2C5" stroke-width="3"/>
      <use data-icon="tabler-outline/components" x="24" y="20" width="42" height="42" fill="#55A68B" stroke-width="2"/>
      <text x="86" y="37" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="30" font-weight="700" fill="#1F2937">MeshRenderer / Collider</text>
      <text x="86" y="66" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#596273">显示与碰撞能力来自不同组件</text>
    </g>
    <g id="component-script" transform="translate(28 284)">
      <rect x="0" y="0" width="634" height="126" rx="18" fill="#FFF0D1" stroke="#F2A93B" stroke-width="4"/>
      <use data-icon="tabler-outline/code" x="24" y="24" width="46" height="46" fill="#8C5A00" stroke-width="2"/>
      <text x="90" y="43" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="30" font-weight="700" fill="#8C5A00">Rotator.cs</text>
      <text x="90" y="75" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700" fill="#1F2937">public class Rotator : MonoBehaviour</text>
      <text x="90" y="106" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#596273">文件名必须与可挂载类名完全一致</text>
    </g>
  </g>
  <g id="entry-card" transform="translate(790 154)">
    <rect x="0" y="0" width="430" height="292" rx="24" fill="#1F2937"/>
    <text x="26" y="42" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#F2A93B">THREE ENTRY POINTS</text>
    <text x="28" y="98" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700" fill="#FFFFFF">transform</text>
    <text x="204" y="98" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#D8D2C5">当前 Transform</text>
    <text x="28" y="158" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700" fill="#FFFFFF">gameObject</text>
    <text x="204" y="158" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#D8D2C5">当前对象实例</text>
    <text x="28" y="218" font-family="Consolas, 'Courier New', monospace" font-size="25" font-weight="700" fill="#FFFFFF">GetComponent&lt;T&gt;()</text>
    <text x="28" y="258" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#D8D2C5">获取当前对象上的某种组件</text>
  </g>
  <g id="case-note" transform="translate(790 470)">
    <rect x="0" y="0" width="430" height="132" rx="22" fill="#E8F5F0" stroke="#55A68B" stroke-width="3"/>
    <text x="24" y="40" font-family="KaiTi, 'Trebuchet MS', serif" font-size="30" font-weight="700" fill="#2F8F6A">大小写不是装饰</text>
    <text x="24" y="78" font-family="Consolas, 'Courier New', monospace" font-size="23" fill="#1F2937">GameObject / Transform</text>
    <text x="24" y="110" font-family="Consolas, 'Courier New', monospace" font-size="23" fill="#596273">gameObject / transform</text>
  </g>
  <line id="footer-line" x1="58" y1="667" x2="1222" y2="667" stroke="#D8D2C5" stroke-width="2"/>
  <text x="60" y="700" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">Unity 语法基础 · MonoBehaviour</text>
  <text id="page-number" data-pptx-role="page-number" x="1220" y="700" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#8A8F98">3</text>
</svg>
