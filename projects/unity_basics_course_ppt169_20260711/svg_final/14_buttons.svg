<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content"><rect width="1280" height="720" fill="#F7F9FC"/><text x="60" y="82" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="56" font-weight="700" fill="#172033">UIManager 集中管理按钮和面板状</text><text x="62" y="128" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="32" fill="#56627A">Inspector 引用 + onClick，让行为清晰可追踪</text><g font-family="'Segoe UI','Microsoft YaHei',sans-serif"><rect x="60" y="180" width="350" height="440" rx="20" fill="#FFFFFF" stroke="#C9D4F2"/><text x="92" y="240" font-size="42" font-weight="700" fill="#3157D5">Hierarchy</text><text x="92" y="310" font-size="32" fill="#172033">Canvas</text><text x="125" y="365" font-size="32" fill="#172033">MenuPanel</text><text x="160" y="420" font-size="32" fill="#172033">PlayButton</text><text x="160" y="475" font-size="32" fill="#172033">SettingsButton</text><text x="160" y="530" font-size="32" fill="#172033">QuitButton</text><rect x="460" y="180" width="760" height="440" rx="20" fill="#172033"/><text x="495" y="235" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#22A6B3">void Awake() {</text><text x="525" y="285" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#FFFFFF">playButton.onClick.AddListener(OnPlay);</text><text x="525" y="335" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#FFFFFF">settingsButton.onClick.AddListener(OpenSettings);</text><text x="495" y="385" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#22A6B3">}</text><text x="495" y="455" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#7C4DFF">menuPanel.SetActive(false);</text><text x="495" y="515" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#7C4DFF">settingsPanel.SetActive(true);</text><text x="495" y="575" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#FFFFFF">Application.Quit();</text></g><text id="page-number" data-pptx-role="page-number" x="1190" y="680" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="18" fill="#8490A8">14</text></svg>



