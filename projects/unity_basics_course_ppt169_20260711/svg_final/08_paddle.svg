<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content"><rect width="1280" height="720" fill="#F7F9FC"/><text x="60" y="82" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="56" font-weight="700" fill="#172033">输入 × 速度 × deltaTime = 稳定移动</text><text x="62" y="128" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="32" fill="#56627A">读取轴输入、更新时间独立位移，再限制活动范围</text><rect x="60" y="178" width="730" height="470" rx="18" fill="#172033"/><g font-family="Consolas,'Courier New',monospace" font-size="24" fill="#F7F9FC"><text x="90" y="230">float input = Input.GetAxisRaw("Vertical");</text><text x="90" y="290">Vector3 pos = transform.position;</text><text x="90" y="350" fill="#22A6B3">pos.y += input * speed * Time.deltaTime;</text><text x="90" y="410" fill="#7C4DFF">pos.y = Mathf.Clamp(pos.y, -limitY, limitY);</text><text x="90" y="470">transform.position = pos;</text></g><g font-family="'Segoe UI','Microsoft YaHei',sans-serif"><circle cx="880" cy="250" r="44" fill="#3157D5"/><text x="868" y="262" font-size="32" font-weight="700" fill="#FFFFFF">1</text><text x="950" y="260" font-size="32" fill="#172033">读取 Vertical</text><circle cx="880" cy="380" r="44" fill="#7C4DFF"/><text x="868" y="392" font-size="32" font-weight="700" fill="#FFFFFF">2</text><text x="950" y="390" font-size="32" fill="#172033">计算位移</text><circle cx="880" cy="510" r="44" fill="#22A6B3"/><text x="868" y="522" font-size="32" font-weight="700" fill="#FFFFFF">3</text><text x="950" y="520" font-size="32" fill="#172033">Clamp 限位</text></g><text id="page-number" data-pptx-role="page-number" x="1190" y="680" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="18" fill="#8490A8">8</text></svg>



