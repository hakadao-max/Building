<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content"><rect width="1280" height="720" fill="#F7F9FC"/><text x="60" y="82" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="56" font-weight="700" fill="#172033">一个 MonoBehaviour，就是一个可挂载组件</text><text x="62" y="128" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="32" fill="#56627A">文件名、类名、继承关系和方法结构组成最小骨架</text><rect x="62" y="180" width="690" height="450" rx="18" fill="#172033"/><text x="94" y="230" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#22A6B3">using UnityEngine;</text><text x="94" y="300" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#F7F9FC">public class BallController</text><text x="94" y="338" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#7C4DFF">    : MonoBehaviour</text><text x="94" y="390" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#F7F9FC">{</text><text x="120" y="440" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#F7F9FC">void Start() {</text><text x="150" y="490" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#22A6B3">Debug.Log("Ball ready");</text><text x="120" y="540" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#F7F9FC">}</text><text x="94" y="590" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#F7F9FC">}</text><g font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="32" fill="#172033"><rect x="790" y="200" width="420" height="86" rx="16" fill="#FFFFFF" stroke="#C9D4F2"/><text x="820" y="254">① using：导入 Unity API</text><rect x="790" y="310" width="420" height="86" rx="16" fill="#FFFFFF" stroke="#C9D4F2"/><text x="820" y="364">② class：脚本类型</text><rect x="790" y="420" width="420" height="86" rx="16" fill="#FFFFFF" stroke="#C9D4F2"/><text x="820" y="474">③ 继承：可挂载</text><rect x="790" y="530" width="420" height="86" rx="16" fill="#FFFFFF" stroke="#C9D4F2"/><text x="820" y="584">④ 方法：响应生命周期</text></g><text id="page-number" data-pptx-role="page-number" x="1190" y="680" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="18" fill="#8490A8">6</text></svg>



