<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content"><rect width="1280" height="720" fill="#F7F9FC"/><text x="60" y="82" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="56" font-weight="700" fill="#172033">用函数封装动作，用集合管理多个对象</text><text x="62" y="128" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="32" fill="#56627A">函数降低重复，集合把同类数据组织成可遍历结构</text><rect x="60" y="180" width="1160" height="150" rx="20" fill="#3157D5"/><text x="90" y="235" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#EAF0FF">float GetMoveAmount(float input, float speed)</text><text x="90" y="290" font-family="Consolas,'Courier New',monospace" font-size="24" fill="#FFFFFF">return input * speed * Time.deltaTime;</text><g font-family="'Segoe UI','Microsoft YaHei',sans-serif"><rect x="60" y="370" width="350" height="230" rx="20" fill="#FFFFFF" stroke="#C9D4F2"/><text x="90" y="430" font-size="42" font-weight="700" fill="#3157D5">Array</text><text x="90" y="500" font-size="32" fill="#172033">固定长度</text><rect x="465" y="370" width="350" height="230" rx="20" fill="#FFFFFF" stroke="#C9D4F2"/><text x="495" y="430" font-size="42" font-weight="700" fill="#7C4DFF">List</text><text x="495" y="500" font-size="32" fill="#172033">长度可变</text><rect x="870" y="370" width="350" height="230" rx="20" fill="#FFFFFF" stroke="#C9D4F2"/><text x="900" y="430" font-size="42" font-weight="700" fill="#22A6B3">Dictionary</text><text x="900" y="500" font-size="32" fill="#172033">键 → 值</text></g><text id="page-number" data-pptx-role="page-number" x="1190" y="680" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="18" fill="#8490A8">9</text></svg>



