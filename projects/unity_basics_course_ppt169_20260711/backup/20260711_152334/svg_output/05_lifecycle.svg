<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content"><rect width="1280" height="720" fill="#F7F9FC"/><text x="60" y="82" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="56" font-weight="700" fill="#172033">把初始化、输入与物理放在正确的时</text><text x="62" y="128" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="32" fill="#56627A">生命周期决定代码何时执行，也决定移动是否稳定</text><g id="flow"><path d="M180 350 H1060" stroke="#C9D4F2" stroke-width="10" stroke-linecap="round"/><g font-family="'Segoe UI','Microsoft YaHei',sans-serif" text-anchor="middle"><circle cx="190" cy="350" r="64" fill="#3157D5"/><text x="190" y="360" font-size="32" font-weight="700" fill="#FFFFFF">Awake</text><text x="190" y="452" font-size="24" fill="#56627A">缓存组件引用</text><circle cx="480" cy="350" r="64" fill="#7C4DFF"/><text x="480" y="360" font-size="32" font-weight="700" fill="#FFFFFF">Start</text><text x="480" y="452" font-size="24" fill="#56627A">初始化状</text><rect x="720" y="240" width="230" height="120" rx="18" fill="#FFFFFF" stroke="#C9D4F2"/><text x="835" y="312" font-size="32" font-weight="700" fill="#3157D5">Update</text><text x="835" y="405" font-size="24" fill="#56627A">每帧读取输入</text><rect x="720" y="440" width="300" height="120" rx="18" fill="#FFFFFF" stroke="#C9D4F2"/><text x="870" y="512" font-size="32" font-weight="700" fill="#22A6B3">FixedUpdate</text><text x="870" y="605" font-size="24" fill="#56627A">固定间隔处理物理</text></g><path d="M544 350 H680 L720 300" stroke="#3157D5" stroke-width="5" fill="none"/><path d="M680 350 L720 500" stroke="#22A6B3" stroke-width="5" fill="none"/></g><text id="page-number" data-pptx-role="page-number" x="1190" y="680" font-family="'Segoe UI','Microsoft YaHei',sans-serif" font-size="18" fill="#8490A8">5</text></svg>



