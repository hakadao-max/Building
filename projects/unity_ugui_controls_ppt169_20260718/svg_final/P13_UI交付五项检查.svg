  <text x="62" y="124" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">UI 的完成标准不只是“能显示”</text>
  <g id="final-checks" transform="translate(80 160)" font-family="'Microsoft YaHei', Arial, sans-serif">
    <g transform="translate(0 0)"><circle cx="42" cy="42" r="40" fill="#2457A6"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">1</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#EAF0FA"/><text x="136" y="38" font-size="32" font-weight="700" fill="#1F2937">适配</text><text x="292" y="38" font-size="24" fill="#596273">Anchor、Pivot、Canvas Scaler 在不同宽高比下稳定</text></g>
    <g transform="translate(0 96)"><circle cx="42" cy="42" r="40" fill="#55A68B"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">2</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#E8F5F0"/><text x="136" y="38" font-size="32" font-weight="700" fill="#1F2937">交互</text><text x="292" y="38" font-size="24" fill="#596273">鼠标、键盘、手柄都有清楚的导航与焦点反馈</text></g>
    <g transform="translate(0 192)"><circle cx="42" cy="42" r="40" fill="#F2A93B"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">3</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#FFF0D1"/><text x="136" y="38" font-size="32" font-weight="700" fill="#1F2937">状态</text><text x="292" y="38" font-size="24" fill="#596273">正常、悬停、按下、禁用与当前值都可辨认</text></g>
    <g transform="translate(0 288)"><circle cx="42" cy="42" r="40" fill="#D85C45"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">4</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#F4F0E8"/><text x="136" y="38" font-size="32" font-weight="700" fill="#1F2937">事件</text><text x="292" y="38" font-size="24" fill="#596273">监听添加与移除成对，Inspector 引用未丢失</text></g>
    <g transform="translate(0 384)"><circle cx="42" cy="42" r="40" fill="#596273"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">5</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2C5" stroke-width="3"/><text x="136" y="38" font-size="32" font-weight="700" fill="#1F2937">性能</text><text x="292" y="38" font-size="24" fill="#596273">装饰图关闭 Raycast，RawImage 与纹理批次不过度使用</text></g>
