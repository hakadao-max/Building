<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="60" y="76" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">Canvas 模式：贴在屏幕上，还是放进世界里？</text>
  <text x="62" y="124" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">选择 Render Mode，就是选择 UI 所在的空间</text>
  <g id="canvas-modes" transform="translate(80 160)" font-family="'Microsoft YaHei', Arial, sans-serif">
    <g>
      <rect x="0" y="0" width="530" height="438" rx="30" fill="#FFFFFF" stroke="#2457A6" stroke-width="4"/>
      <rect x="0" y="0" width="530" height="88" rx="30" fill="#2457A6"/>
      <!-- icon: tabler-outline/layout-dashboard -->
  <g transform="translate(28, 20) scale(2)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M5 4h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-6a1 1 0 0 1 1 -1" />
    <path d="M5 16h4a1 1 0 0 1 1 1v2a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-2a1 1 0 0 1 1 -1" />
    <path d="M15 12h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-6a1 1 0 0 1 1 -1" />
    <path d="M15 4h4a1 1 0 0 1 1 1v2a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-2a1 1 0 0 1 1 -1" />
  </g>
      <text x="96" y="58" font-size="36" font-weight="700" fill="#FFFFFF">Screen Space - Overlay</text>
      <text x="30" y="140" font-size="32" font-weight="700" fill="#1F2937">最适合菜单与 HUD</text>
      <text x="30" y="192" font-size="24" fill="#596273">· 不需要渲染摄像机</text>
      <text x="30" y="234" font-size="24" fill="#596273">· 不受 3D 场景遮挡</text>
      <text x="30" y="276" font-size="24" fill="#596273">· 由屏幕与 Canvas Scaler 决定尺寸</text>
      <rect x="30" y="318" width="470" height="84" rx="18" fill="#EAF0FA"/>
      <text x="265" y="352" text-anchor="middle" font-size="24" fill="#2457A6">适配重点</text>
      <text x="265" y="386" text-anchor="middle" font-size="32" font-weight="700" fill="#2457A6">分辨率 + 锚点</text>
    </g>
    <g transform="translate(590 0)">
      <rect x="0" y="0" width="530" height="438" rx="30" fill="#FFFFFF" stroke="#55A68B" stroke-width="4"/>
      <rect x="0" y="0" width="530" height="88" rx="30" fill="#55A68B"/>
      <!-- icon: tabler-outline/world -->
  <g transform="translate(28, 20) scale(2)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" />
    <path d="M3.6 9h16.8" />
    <path d="M3.6 15h16.8" />
    <path d="M11.5 3a17 17 0 0 0 0 18" />
    <path d="M12.5 3a17 17 0 0 1 0 18" />
  </g>
      <text x="96" y="58" font-size="36" font-weight="700" fill="#FFFFFF">World Space</text>
      <text x="30" y="140" font-size="32" font-weight="700" fill="#1F2937">最适合世界面板与头顶 UI</text>
      <text x="30" y="192" font-size="24" fill="#596273">· 有真实世界位置与尺寸</text>
      <text x="30" y="234" font-size="24" fill="#596273">· 受距离、角度、遮挡影响</text>
      <text x="30" y="276" font-size="24" fill="#596273">· 需要 Event Camera 与正确缩放</text>
      <rect x="30" y="318" width="470" height="84" rx="18" fill="#E8F5F0"/>
      <text x="265" y="352" text-anchor="middle" font-size="24" fill="#2F8F6A">适配重点</text>
      <text x="265" y="386" text-anchor="middle" font-size="32" font-weight="700" fill="#2F8F6A">尺寸 + 朝向 + 射线</text>
    </g>
