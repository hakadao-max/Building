    <text x="96" y="305" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#2457A6">Character player =</text>
    <text x="128" y="337" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#2457A6">new Character();</text>
    <text x="96" y="374" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">player.Name = "小明";</text>
    <text x="96" y="409" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">player.Health = 100;</text>
    <text x="96" y="454" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#F2A93B">Character enemy =</text>
    <text x="128" y="486" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#F2A93B">new Character();</text>
    <text x="96" y="523" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">enemy.Name = "史莱姆";</text>
    <text x="96" y="558" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">enemy.Health = 30;</text>
