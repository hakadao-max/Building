    <text x="161" y="311" font-family="KaiTi, 'Trebuchet MS', serif" font-size="36" font-weight="700" fill="#1F2937">对外开放</text>
    <text x="95" y="365" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">拿到对象的代码都能访问</text>
    <text x="95" y="402" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">常用于对外提供的方法</text>
    <text x="95" y="452" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#2457A6">public void Attack()</text>
  </g>
