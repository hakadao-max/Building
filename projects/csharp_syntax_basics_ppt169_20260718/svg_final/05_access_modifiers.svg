<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="background" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="62" y="70" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#2457A6">访问修饰符决定</text>
  <text x="62" y="126" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#2457A6">“谁能碰这些成员”</text>
  <text x="722" y="114" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">它定义的是边界，不是装饰。</text>
