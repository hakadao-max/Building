    <text x="562" y="311" font-family="KaiTi, 'Trebuchet MS', serif" font-size="36" font-weight="700" fill="#1F2937">类内上锁</text>
    <text x="496" y="365" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">只有当前类内部能访问</text>
    <text x="496" y="402" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">用于保护内部数据</text>
    <text x="496" y="452" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#D85C45">private int health;</text>
  </g>
