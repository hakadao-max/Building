    <text x="963" y="311" font-family="KaiTi, 'Trebuchet MS', serif" font-size="36" font-weight="700" fill="#1F2937">对子类开放</text>
    <text x="897" y="365" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">当前类和它的子类可访问</text>
    <text x="897" y="402" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">为继承留下扩展点</text>
    <text x="897" y="452" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#2F8F6A">protected int level;</text>
  </g>
  <g id="recommendation">
    <path d="M108 535 C328 523 683 531 1158 522 L1168 620 C788 631 421 625 98 618 Z" fill="#FFF9E9" stroke="#F2A93B" stroke-width="3"/>
    <text x="132" y="574" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#F2A93B">推荐</text>
    <text x="239" y="574" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="32" font-weight="700" fill="#1F2937">数据先设为 <tspan font-family="Consolas, 'Courier New', monospace" fill="#D85C45">private</tspan></text>
    <text x="239" y="612" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">再通过方法控制它如何改变，避免外部代码任意改写。</text>
  </g>
