    <text x="74" y="542" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">Player(int health)</text>
    <text x="74" y="579" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700" fill="#55A68B">    : base(health)</text>
