  <g id="inheritance-explanation">
    <text x="74" y="214" font-family="KaiTi, 'Trebuchet MS', serif" font-size="36" font-weight="700" fill="#F2A93B">冒号就是继承</text>
    <text x="74" y="260" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">public class Player</text>
    <text x="74" y="295" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700" fill="#2457A6">    : Character</text>
