<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="background" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="62" y="84" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#2457A6">继承表达“是一种”关系</text>
  <text x="66" y="128" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">Player 是一种 Character：复用共同能力，再增加自己的行为。</text>
