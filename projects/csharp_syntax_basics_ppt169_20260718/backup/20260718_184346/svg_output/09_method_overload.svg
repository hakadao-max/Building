    <text x="166" y="247" font-family="KaiTi, 'Trebuchet MS', serif" font-size="36" font-weight="700" fill="#1F2937">同名的两个版本</text>
    <path d="M100 273 C205 263 330 271 414 264" fill="none" stroke="#2457A6" stroke-width="3" stroke-linecap="round" />
    <text x="99" y="306" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700" fill="#2457A6">public void Attack()</text>
    <text x="105" y="337" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">{ Console.WriteLine(</text>
    <text x="131" y="368" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">"普通攻击"); }</text>
    <path d="M100 391 C205 381 330 389 414 382" fill="none" stroke="#D8D2C5" stroke-width="2" x="61" y="425" />
    <text x="106" y="430" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700" fill="#F2A93B">public void Attack</text>
    <text x="131" y="458" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700" fill="#F2A93B">(int damage)</text>
    <text x="99" y="493" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">{ Console.WriteLine(</text>
    <text x="131" y="525" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">$"造成 {damage}</text>
    <text x="131" y="557" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#1F2937">点伤害"); }</text>
