<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <g id="title-block">
    <text x="60" y="84" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">导出最终 Mesh，但不要夹带无关数据</text>
    <text x="62" y="122" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">几何选项决定“导出后的形状”，骨架与动画决定“是否多带一套系统”</text>
  </g>
  <g id="card-normals" transform="translate(58 154)">
