    <text x="94" y="52" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#2F8F6A">应用修改器：开</text>
    <text x="24" y="102" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">导出修改器计算后的最终 Mesh</text>
    <text x="24" y="138" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">静态模型通常最符合预期</text>
