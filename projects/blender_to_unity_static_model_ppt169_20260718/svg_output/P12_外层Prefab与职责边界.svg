    <text x="26" y="104" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="23" fill="#1F2937">材质映射 · Collider</text>
    <text x="26" y="144" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="23" fill="#1F2937">Rigidbody · 脚本 · Prefab</text>
    <text x="26" y="184" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="23" fill="#1F2937">场景测试与运行时行为</text>
    <rect x="26" y="198" width="326" height="20" rx="10" fill="#FFFFFF"/>
    <text x="189" y="213" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="700" fill="#2F8F6A">职责分离 = 重导入安全</text>
  </g>
  <line id="footer-line" x1="58" y1="667" x2="1222" y2="667" stroke="#D8D2C5" stroke-width="2"/>
