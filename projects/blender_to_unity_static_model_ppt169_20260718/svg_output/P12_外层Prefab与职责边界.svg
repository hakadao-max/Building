      <text x="160" y="286" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="700" fill="#2457A6">Unity 维护，重导入不丢失</text>
    </g>
    <path d="M360 248 H400" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M386 234 L402 248 L386 262" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="model-module" transform="translate(398 96)">
      <rect x="0" y="0" width="320" height="306" rx="22" fill="#FFF9E9" stroke="#F2A93B" stroke-width="3"/>
      <use data-icon="tabler-outline/hierarchy-3" x="24" y="20" width="48" height="48" fill="#F2A93B" stroke-width="2"/>
      <text x="88" y="53" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#8C5A00">Model</text>
      <rect x="34" y="92" width="252" height="128" rx="20" fill="#FFFFFF" stroke="#F2A93B" stroke-width="3"/>
      <use data-icon="tabler-outline/file-3d" x="56" y="118" width="72" height="72" fill="#F2A93B" stroke-width="2"/>
      <text x="148" y="142" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700" fill="#1F2937">Imported FBX</text>
