      <use data-icon="tabler-outline/hammer" x="24" y="20" width="48" height="48" fill="#2457A6" stroke-width="2"/>
      <text x="88" y="53" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#2457A6">游戏能力</text>
      <text x="24" y="110" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Collider</text>
      <text x="24" y="154" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Rigidbody</text>
      <text x="24" y="198" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Gameplay Scripts</text>
      <text x="24" y="242" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">交互点 / 音效 / 特效</text>
