<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <g id="title-block">
    <text x="60" y="84" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">提交明确导出的 FBX，不要让 Unity 依赖本机 Blender</text>
    <text x="62" y="122" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">稳定交付的关键，是把源文件、交换格式与运行时资产分开</text>
  </g>
  <g id="asset-pipeline" transform="translate(60 176)">
    <g id="stage-source">
      <circle cx="122" cy="48" r="42" fill="#F2A93B"/>
      <use data-icon="tabler-outline/cube" x="94" y="20" width="56" height="56" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="110" width="244" height="254" rx="22" fill="#FFF0D1" stroke="#F2A93B" stroke-width="3"/>
      <text x="122" y="154" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="34" font-weight="700" fill="#8C5A00">Blender 源文件</text>
      <text x="122" y="196" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="26" font-weight="700" fill="#1F2937">model.blend</text>
      <text x="24" y="242" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 建模与修改器</text>
      <text x="24" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 轴心、层级与 UV</text>
      <rect x="22" y="312" width="200" height="34" rx="17" fill="#FFFFFF"/>
      <text x="122" y="336" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" font-weight="700" fill="#8C5A00">团队内部保留</text>
    </g>
    <path d="M252 238 H300" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M286 224 L302 238 L286 252" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="stage-export" transform="translate(294 0)">
      <circle cx="122" cy="48" r="42" fill="#F2A93B"/>
      <use data-icon="tabler-outline/file-export" x="94" y="20" width="56" height="56" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="110" width="244" height="254" rx="22" fill="#FFF9E9" stroke="#F2A93B" stroke-width="3"/>
      <text x="122" y="154" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="34" font-weight="700" fill="#8C5A00">明确导出</text>
      <text x="122" y="196" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="26" font-weight="700" fill="#1F2937">model.fbx</text>
      <text x="24" y="242" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 固定导出预设</text>
      <text x="24" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 可重现交换结果</text>
      <rect x="22" y="312" width="200" height="34" rx="17" fill="#FFF0D1"/>
      <text x="122" y="336" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" font-weight="700" fill="#8C5A00">交付主体</text>
    </g>
    <path d="M546 238 H594" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M580 224 L596 238 L580 252" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="stage-textures" transform="translate(588 0)">
      <circle cx="122" cy="48" r="42" fill="#55A68B"/>
      <use data-icon="tabler-outline/photo" x="94" y="20" width="56" height="56" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="110" width="244" height="254" rx="22" fill="#E8F5F0" stroke="#55A68B" stroke-width="3"/>
      <text x="122" y="154" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="34" font-weight="700" fill="#2F8F6A">独立贴图</text>
      <text x="122" y="196" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="23" font-weight="700" fill="#1F2937">BaseColor / Normal</text>
      <text x="24" y="242" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 可单独压缩与替换</text>
      <text x="24" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 贴图类型明确</text>
      <rect x="22" y="312" width="200" height="34" rx="17" fill="#FFFFFF"/>
      <text x="122" y="336" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" font-weight="700" fill="#2F8F6A">独立管理</text>
    </g>
    <path d="M840 238 H888" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M874 224 L890 238 L874 252" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="stage-unity" transform="translate(882 0)">
      <circle cx="122" cy="48" r="42" fill="#2457A6"/>
      <use data-icon="tabler-outline/download" x="94" y="20" width="56" height="56" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="110" width="244" height="254" rx="22" fill="#EAF0FA" stroke="#2457A6" stroke-width="3"/>
      <text x="122" y="154" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="34" font-weight="700" fill="#2457A6">Unity Assets</text>
      <text x="122" y="196" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="23" font-weight="700" fill="#1F2937">FBX + Textures</text>
      <text x="24" y="242" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 创建管线材质</text>
      <text x="24" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" fill="#1F2937">• 组合外层 Prefab</text>
      <rect x="22" y="312" width="200" height="34" rx="17" fill="#FFFFFF"/>
      <text x="122" y="336" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" font-weight="700" fill="#2457A6">运行时资产</text>
    </g>
  </g>
  <g id="direct-blend-warning" transform="translate(174 576)">
    <rect x="0" y="0" width="932" height="56" rx="18" fill="#D85C45"/>
    <use data-icon="tabler-outline/alert-triangle" x="18" y="12" width="32" height="32" fill="#FFFFFF" stroke-width="2"/>
    <text x="484" y="36" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="23" font-weight="700" fill="#FFFFFF">直接导入 .blend 会依赖本机 Blender 版本；程序化材质节点也不会完整自动转换</text>
  </g>
  <line id="footer-line" x1="58" y1="667" x2="1222" y2="667" stroke="#D8D2C5" stroke-width="2"/>
  <text x="60" y="700" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">Blender → Unity · 交付边界</text>
  <text id="page-number" data-pptx-role="page-number" x="1220" y="700" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#8A8F98">3</text>
</svg>
