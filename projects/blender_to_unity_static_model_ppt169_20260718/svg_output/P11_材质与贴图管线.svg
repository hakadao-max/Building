<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <g id="title-block">
    <text x="60" y="84" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">程序化材质不会自动还原，贴图类型必须明确</text>
    <text x="62" y="122" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">Blender 负责输出贴图，Unity 负责按当前渲染管线重新组装材质</text>
  </g>
  <g id="material-pipeline" transform="translate(58 166)">
    <g id="stage-texture">
      <circle cx="128" cy="40" r="38" fill="#F2A93B"/>
      <use data-icon="tabler-outline/photo" x="103" y="15" width="50" height="50" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="92" width="256" height="280" rx="22" fill="#FFF0D1" stroke="#F2A93B" stroke-width="3"/>
      <text x="128" y="134" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#8C5A00">1. 独立贴图</text>
      <text x="24" y="180" font-family="Consolas, 'Courier New', monospace" font-size="21" fill="#1F2937">BaseColor</text>
      <text x="24" y="216" font-family="Consolas, 'Courier New', monospace" font-size="21" fill="#1F2937">Normal</text>
      <text x="24" y="252" font-family="Consolas, 'Courier New', monospace" font-size="21" fill="#1F2937">Metallic / AO</text>
      <text x="24" y="288" font-family="Consolas, 'Courier New', monospace" font-size="21" fill="#1F2937">Roughness</text>
      <rect x="22" y="326" width="212" height="28" rx="14" fill="#FFFFFF"/>
      <text x="128" y="347" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="700" fill="#8C5A00">不要依赖嵌入材质节点</text>
    </g>
    <path d="M266 232 H306" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M292 218 L308 232 L292 246" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="stage-import" transform="translate(300 0)">
      <circle cx="128" cy="40" r="38" fill="#2457A6"/>
      <use data-icon="tabler-outline/download" x="103" y="15" width="50" height="50" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="92" width="256" height="280" rx="22" fill="#EAF0FA" stroke="#2457A6" stroke-width="3"/>
      <text x="128" y="134" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#2457A6">2. 导入类型</text>
      <text x="24" y="180" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="21" fill="#1F2937">Base Color：sRGB 开</text>
      <text x="24" y="216" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="21" fill="#1F2937">Normal：Normal Map</text>
      <text x="24" y="252" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="21" fill="#1F2937">Metal / AO：sRGB 关</text>
      <text x="24" y="288" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="21" fill="#1F2937">Mask 数据：sRGB 关</text>
      <rect x="22" y="326" width="212" height="28" rx="14" fill="#FFFFFF"/>
      <text x="128" y="347" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="700" fill="#2457A6">颜色与数据不可混淆</text>
    </g>
    <path d="M566 232 H606" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M592 218 L608 232 L592 246" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="stage-material" transform="translate(600 0)">
      <circle cx="128" cy="40" r="38" fill="#55A68B"/>
      <use data-icon="tabler-outline/palette" x="103" y="15" width="50" height="50" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="92" width="256" height="280" rx="22" fill="#E8F5F0" stroke="#55A68B" stroke-width="3"/>
      <text x="128" y="134" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#2F8F6A">3. Unity 材质</text>
      <text x="24" y="180" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="21" fill="#1F2937">选择 URP / HDRP / Built-in</text>
      <text x="24" y="216" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="21" fill="#1F2937">对应 Shader</text>
      <text x="24" y="256" font-family="Consolas, 'Courier New', monospace" font-size="20" font-weight="700" fill="#D85C45">Smoothness = 1 - Roughness</text>
      <text x="24" y="292" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="21" fill="#1F2937">通过 Remapped Materials</text>
      <rect x="22" y="326" width="212" height="28" rx="14" fill="#FFFFFF"/>
      <text x="128" y="347" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="700" fill="#2F8F6A">材质资产独立复用</text>
    </g>
    <path d="M866 232 H906" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M892 218 L908 232 L892 246" fill="none" stroke="#596273" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="stage-renderer" transform="translate(900 0)">
      <circle cx="128" cy="40" r="38" fill="#2457A6"/>
      <use data-icon="tabler-outline/sun" x="103" y="15" width="50" height="50" fill="#FFFFFF" stroke-width="2"/>
      <rect x="0" y="92" width="256" height="280" rx="22" fill="#FFFFFF" stroke="#2457A6" stroke-width="3"/>
      <text x="128" y="134" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="32" font-weight="700" fill="#2457A6">4. 最终画面</text>
      <text x="24" y="182" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" font-weight="700" fill="#D85C45">粉红模型</text>
      <text x="24" y="214" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#596273">Shader 与管线不兼容</text>
      <text x="24" y="260" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="22" font-weight="700" fill="#596273">白色模型</text>
      <text x="24" y="292" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#596273">材质或贴图未映射</text>
      <rect x="22" y="326" width="212" height="28" rx="14" fill="#EAF0FA"/>
      <text x="128" y="347" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="700" fill="#2457A6">在场景灯光下验收</text>
    </g>
  </g>
  <g id="material-note" transform="translate(178 576)">
    <rect x="0" y="0" width="924" height="56" rx="18" fill="#1F2937"/>
    <text x="462" y="36" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="23" font-weight="700" fill="#FFFFFF">Blender 节点图是制作环境；Unity 材质才是运行时渲染配置</text>
  </g>
  <line id="footer-line" x1="58" y1="667" x2="1222" y2="667" stroke="#D8D2C5" stroke-width="2"/>
  <text x="60" y="700" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">Blender → Unity · 材质与贴图</text>
  <text id="page-number" data-pptx-role="page-number" x="1220" y="700" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#8A8F98">11</text>
</svg>
