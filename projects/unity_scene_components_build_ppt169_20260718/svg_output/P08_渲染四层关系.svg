      <text x="56" y="57" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">01</text>
      <use data-icon="tabler-outline/palette" x="140" y="20" width="48" height="48" fill="#2457A6" stroke-width="2"/>
      <text x="210" y="42" font-size="32" font-weight="700" fill="#1F2937">Texture 贴图</text>
      <text x="210" y="73" font-size="24" fill="#596273">颜色、法线、粗糙度等表面数据</text>
    </g>
    <g transform="translate(0 106)">
      <rect x="0" y="0" width="860" height="88" rx="20" fill="#E8F5F0" stroke="#55A68B" stroke-width="3"/>
      <rect x="0" y="0" width="112" height="88" rx="20" fill="#55A68B"/>
      <text x="56" y="57" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">02</text>
      <circle cx="164" cy="44" r="25" fill="#F2A93B" stroke="#2F8F6A" stroke-width="5"/>
      <text x="210" y="42" font-size="32" font-weight="700" fill="#1F2937">Shader 着色器</text>
      <text x="210" y="73" font-size="24" fill="#596273">规定顶点与像素如何被计算</text>
    </g>
    <g transform="translate(0 212)">
      <rect x="0" y="0" width="860" height="88" rx="20" fill="#FFF0D1" stroke="#F2A93B" stroke-width="3"/>
      <rect x="0" y="0" width="112" height="88" rx="20" fill="#F2A93B"/>
      <text x="56" y="57" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">03</text>
      <use data-icon="tabler-outline/palette" x="140" y="20" width="48" height="48" fill="#F2A93B" stroke-width="2"/>
      <text x="210" y="42" font-size="32" font-weight="700" fill="#1F2937">Material 材质</text>
      <text x="210" y="73" font-size="24" fill="#596273">选择 Shader，并保存它所需参数</text>
    </g>
    <g transform="translate(0 318)">
