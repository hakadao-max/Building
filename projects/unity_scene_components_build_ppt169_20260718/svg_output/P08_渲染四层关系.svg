<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="60" y="76" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">从贴图到画面：Texture、Material、Shader、Renderer</text>
  <text x="62" y="124" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">四者不是同义词，而是一条“数据 → 规则 → 绑定 → 输出”的链</text>
  <g id="render-layers" transform="translate(70 158)" font-family="'Microsoft YaHei', Arial, sans-serif">
    <g>
      <rect x="0" y="0" width="860" height="88" rx="20" fill="#EAF0FA" stroke="#2457A6" stroke-width="3"/>
