<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="ending">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="60" y="76" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">做交互原型时，先把这五件事说清楚</text>
  <text x="62" y="124" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">验证“好不好玩”之前，不必先把系统做完整</text>
  <g id="prototype-checks" transform="translate(80 160)" font-family="'Microsoft YaHei', Arial, sans-serif">
    <g transform="translate(0 0)"><circle cx="42" cy="42" r="40" fill="#2457A6"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">1</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#EAF0FA"/><text x="136" y="36" font-size="32" font-weight="700" fill="#1F2937">改变什么</text><text x="330" y="36" font-size="24" fill="#596273">位置、尺度、材料、规则、视角、路线还是状态？</text></g>
    <g transform="translate(0 96)"><circle cx="42" cy="42" r="40" fill="#55A68B"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">2</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#E8F5F0"/><text x="136" y="36" font-size="32" font-weight="700" fill="#1F2937">如何被发现</text><text x="330" y="36" font-size="24" fill="#596273">动作、光、声音、材质或异常现象是否足够清楚？</text></g>
    <g transform="translate(0 192)"><circle cx="42" cy="42" r="40" fill="#F2A93B"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">3</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#FFF0D1"/><text x="136" y="36" font-size="32" font-weight="700" fill="#1F2937">立即反馈</text><text x="330" y="36" font-size="24" fill="#596273">按下、抓住、切换或放置的瞬间，世界如何回应？</text></g>
    <g transform="translate(0 288)"><circle cx="42" cy="42" r="40" fill="#D85C45"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">4</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#F4F0E8"/><text x="136" y="36" font-size="32" font-weight="700" fill="#1F2937">组合空间</text><text x="330" y="36" font-size="24" fill="#596273">同一规则能否用于移动、战斗、探索或解谜？</text></g>
    <g transform="translate(0 384)"><circle cx="42" cy="42" r="40" fill="#596273"/><text x="42" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">5</text><rect x="104" y="0" width="1016" height="84" rx="20" fill="#FFFFFF" stroke="#D8D2C5" stroke-width="3"/><text x="136" y="36" font-size="32" font-weight="700" fill="#1F2937">最小验证</text><text x="330" y="36" font-size="24" fill="#596273">一个房间、一个物体、一条规则，是否已经有趣？</text></g>
  </g>
  <text x="640" y="640" text-anchor="middle" font-family="KaiTi, 'Trebuchet MS', serif" font-size="42" font-weight="700" fill="#2457A6">先让规则有趣，再让内容变多</text>
  <g id="footer" data-pptx-role="footer">
    <line x1="58" y1="667" x2="1178" y2="667" stroke="#D8D2C5" stroke-width="2"/>
    <text x="60" y="700" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">交互设计 · 最小可玩原型</text>
    <text id="slide-number" data-pptx-role="page-number" x="1218" y="700" text-anchor="end" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">15</text>
  </g>
</svg>
