<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="60" y="76" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">《旷野之息》：让规则自己组合</text>
  <text x="62" y="124" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">对象携带属性，系统发送统一事件，组合结果自然出现</text>
  <g id="system-layers" transform="translate(70 156)" font-family="'Microsoft YaHei', Arial, sans-serif">
    <g>
      <rect x="0" y="0" width="900" height="116" rx="22" fill="#EAF0FA" stroke="#2457A6" stroke-width="3"/>
      <text x="28" y="46" font-size="36" font-weight="700" fill="#2457A6">对象属性</text>
      <text x="28" y="88" font-size="24" fill="#596273">Flammable · Conductive · Freezable · Explosive · Wet</text>
    </g>
    <g transform="translate(0 136)">
      <rect x="0" y="0" width="900" height="116" rx="22" fill="#E8F5F0" stroke="#55A68B" stroke-width="3"/>
      <text x="28" y="46" font-size="36" font-weight="700" fill="#2F8F6A">统一事件</text>
      <text x="28" y="88" font-size="24" fill="#596273">热量 · 点燃 · 导电 · 冻结 · 冲击 · 风力</text>
    </g>
    <g transform="translate(0 272)">
      <rect x="0" y="0" width="900" height="116" rx="22" fill="#FFF0D1" stroke="#F2A93B" stroke-width="3"/>
      <text x="28" y="46" font-size="36" font-weight="700" fill="#8C5A00">状态变化与组合结果</text>
      <text x="28" y="88" font-size="24" fill="#596273">燃烧 → 上升气流 · 潮湿 + 雷电 → 导电 · 水 + 冰 → 平台</text>
    </g>
    <g transform="translate(940 0)">
      <rect x="0" y="0" width="270" height="388" rx="26" fill="#FFFFFF" stroke="#D8D2C5" stroke-width="3"/>
      <use data-icon="tabler-outline/flame" x="30" y="38" width="60" height="60" fill="#D85C45" stroke-width="2"/>
      <use data-icon="tabler-outline/bolt" x="105" y="38" width="60" height="60" fill="#F2A93B" stroke-width="2"/>
      <use data-icon="tabler-outline/snowflake" x="180" y="38" width="60" height="60" fill="#2457A6" stroke-width="2"/>
      <text x="135" y="146" text-anchor="middle" font-size="36" font-weight="700" fill="#1F2937">关键</text>
      <text x="135" y="200" text-anchor="middle" font-size="24" fill="#596273">不为每个谜题</text>
      <text x="135" y="236" text-anchor="middle" font-size="24" fill="#596273">写一套专用脚本</text>
      <path d="M44 274 C98 254 172 292 226 270" fill="none" stroke="#F2A93B" stroke-width="7" stroke-linecap="round"/>
      <text x="135" y="330" text-anchor="middle" font-size="24" font-weight="700" fill="#2457A6">组件少不重要</text>
      <text x="135" y="366" text-anchor="middle" font-size="24" font-weight="700" fill="#2457A6">接口统一才重要</text>
    </g>
  </g>
  <rect x="174" y="568" width="932" height="50" rx="16" fill="#2457A6"/>
  <text x="640" y="602" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">玩家不是找正确按钮，而是观察材料并组合已知规则</text>
  <g id="footer" data-pptx-role="footer">
    <line x1="58" y1="667" x2="1178" y2="667" stroke="#D8D2C5" stroke-width="2"/>
    <text x="60" y="700" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">案例 · 属性、事件与系统组合</text>
    <text id="slide-number" data-pptx-role="page-number" x="1218" y="700" text-anchor="end" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">11</text>
  </g>
</svg>
