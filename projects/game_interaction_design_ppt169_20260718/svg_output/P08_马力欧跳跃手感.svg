<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="60" y="76" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">《超级马力欧》：好跳跃里藏着很多“宽容”</text>
  <text x="62" y="124" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">玩家感觉自己按得准，系统其实在悄悄帮忙</text>
  <g id="jump-curve" transform="translate(70 160)" font-family="'Microsoft YaHei', Arial, sans-serif">
    <rect x="0" y="0" width="650" height="438" rx="28" fill="#FFFFFF" stroke="#D8D2C5" stroke-width="3"/>
    <text x="28" y="54" font-size="36" font-weight="700" fill="#2457A6">可变高度跳跃</text>
    <line x1="70" y1="356" x2="580" y2="356" stroke="#596273" stroke-width="5" stroke-linecap="round"/>
    <path d="M100 356 C210 80 330 80 440 356" fill="none" stroke="#2457A6" stroke-width="10" stroke-linecap="round"/>
    <path d="M100 356 C170 196 238 196 306 356" fill="none" stroke="#F2A93B" stroke-width="10" stroke-linecap="round" stroke-dasharray="16 10"/>
    <circle cx="100" cy="356" r="22" fill="#55A68B"/>
    <circle cx="440" cy="356" r="22" fill="#D85C45"/>
    <text x="210" y="112" font-size="24" font-weight="700" fill="#2457A6">按住：高跳</text>
    <text x="170" y="236" font-size="24" font-weight="700" fill="#8C5A00">松开：短跳</text>
    <text x="82" y="404" font-size="24" fill="#596273">起跳</text>
    <text x="416" y="404" font-size="24" fill="#596273">落地</text>
  </g>
  <g id="jump-aids" transform="translate(760 160)" font-family="'Microsoft YaHei', Arial, sans-serif">
    <rect x="0" y="0" width="450" height="438" rx="28" fill="#FFF9E9" stroke="#D8D2C5" stroke-width="3"/>
    <text x="28" y="54" font-size="36" font-weight="700" fill="#1F2937">隐藏的手感组件</text>
    <g font-size="24">
      <rect x="28" y="88" width="394" height="62" rx="16" fill="#EAF0FA"/><text x="50" y="128" fill="#2457A6" font-weight="700">Coyote Time</text><text x="240" y="128" fill="#596273">离开边缘仍可跳</text>
      <rect x="28" y="164" width="394" height="62" rx="16" fill="#E8F5F0"/><text x="50" y="204" fill="#2F8F6A" font-weight="700">Input Buffer</text><text x="240" y="204" fill="#596273">提前按键仍生效</text>
      <rect x="28" y="240" width="394" height="62" rx="16" fill="#FFF0D1"/><text x="50" y="280" fill="#8C5A00" font-weight="700">不同重力</text><text x="240" y="280" fill="#596273">下落更干脆</text>
      <rect x="28" y="316" width="394" height="62" rx="16" fill="#F4F0E8"/><text x="50" y="356" fill="#D85C45" font-weight="700">顶点微调</text><text x="240" y="356" fill="#596273">更容易对准落点</text>
    </g>
    <text x="225" y="416" text-anchor="middle" font-size="24" font-weight="700" fill="#1F2937">一个动作服务移动、战斗与收集</text>
  </g>
  <g id="footer" data-pptx-role="footer">
    <line x1="58" y1="667" x2="1178" y2="667" stroke="#D8D2C5" stroke-width="2"/>
    <text x="60" y="700" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">案例 · 跳跃手感与输入宽容</text>
    <text id="slide-number" data-pptx-role="page-number" x="1218" y="700" text-anchor="end" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#8A8F98">08</text>
  </g>
