      <text x="116" y="56" font-size="36" font-weight="700" fill="#2F8F6A">规则稳定，结果惊喜</text>
      <text x="28" y="120" font-size="24" fill="#596273">规则始终成立，惊喜来自更深用途</text>
      <text x="28" y="160" font-size="24" font-weight="700" fill="#1F2937">惊喜 ≠ 随机或自相矛盾</text>
    </g>
