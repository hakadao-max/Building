      <text x="116" y="56" font-size="36" font-weight="700" fill="#2457A6">一个物体，多种用途</text>
      <text x="28" y="120" font-size="24" fill="#596273">箱子可以堵门、垫脚、压机关、挡激光</text>
      <text x="28" y="160" font-size="24" font-weight="700" fill="#1F2937">玩家把它当“东西”，不是钥匙</text>
    </g>
