<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect id="page-bg" data-pptx-role="background" x="0" y="0" width="1280" height="720" fill="#FFFDF6"/>
  <text x="60" y="76" font-family="KaiTi, 'Trebuchet MS', serif" font-size="56" font-weight="700" fill="#1F2937">交互深度来自四件事，而不是更多按键</text>
  <text x="62" y="124" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#596273">简单规则能组合出多种用途，玩家才会把世界当成“真的能玩”</text>
  <g id="depth-grid" transform="translate(60 160)" font-family="'Microsoft YaHei', Arial, sans-serif">
